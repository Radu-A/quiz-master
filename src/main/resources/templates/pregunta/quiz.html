<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:if="${tematica != null}" th:text="'Desafío: ' + ${tematica.nombre} + ' — QuizMaster'">Desafío — QuizMaster</title>
    <title th:if="${tematica == null}">Desafío Combinado — QuizMaster</title>
</head>
<body>

<section>
    <div class="quiz-hero quiz-hero-desafio">
        <div class="container text-center">
            <span class="badge-pill">Desafío Combinado</span>
            <h1>Desafío <span class="highlight">Combinado</span></h1>
            <p th:if="${tematica != null}" th:text="'Temática: ' + ${tematica.nombre}">Temática</p>
            <p th:if="${tematica == null}">Todas las temáticas combinadas</p>
            <div class="quiz-meta">
                <span class="quiz-meta-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span th:text="${total} + ' preguntas'">5 preguntas</span>
                </span>
            </div>
        </div>
    </div>

    <div class="quiz-section">
        <div class="container">
            <form method="post" th:action="@{/pregunta/quiz(tematicaId=${tematicaId})}">
                <div th:each="pregunta, iterStat : ${preguntas}" class="quiz-card"
                     th:classappend="${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaVerdaderoFalso)} ? 'quiz-card-vf' : (${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaSeleccionUnica)} ? 'quiz-card-su' : 'quiz-card-sm')">
                    <div class="quiz-card-header">
                        <span class="quiz-card-number" th:text="'Pregunta ' + (${iterStat.index} + 1) + ' de ' + ${total}">Pregunta 1 de 5</span>
                        <span class="quiz-card-theme" th:text="${pregunta.tematica.nombre}">Historia</span>
                        <span th:if="${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaSeleccionMultiple)}" class="quiz-card-hint">Selecciona todas las correctas</span>
                    </div>
                    <p class="quiz-card-question" th:text="${pregunta.enunciado}">Enunciado aquí</p>

                    <!-- Verdadero / Falso -->
                    <div th:if="${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaVerdaderoFalso)}" class="quiz-options">
                        <label class="quiz-option">
                            <input type="radio" th:name="'r_' + ${pregunta.id}" value="true" required>
                            <span class="quiz-option-marker quiz-option-marker-true">V</span>
                            <span class="quiz-option-text">Verdadero</span>
                        </label>
                        <label class="quiz-option">
                            <input type="radio" th:name="'r_' + ${pregunta.id}" value="false">
                            <span class="quiz-option-marker quiz-option-marker-false">F</span>
                            <span class="quiz-option-text">Falso</span>
                        </label>
                    </div>

                    <!-- Selección Única -->
                    <div th:if="${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaSeleccionUnica)}" class="quiz-options">
                        <label th:each="opcion : ${pregunta.opciones}" class="quiz-option">
                            <input type="radio" th:name="'r_' + ${pregunta.id}" th:value="${opcion}" required>
                            <span class="quiz-option-marker quiz-option-marker-su" th:text="${#strings.substring(opcion, 0, 1)}">A</span>
                            <span class="quiz-option-text" th:text="${opcion}">Opción</span>
                        </label>
                    </div>

                    <!-- Selección Múltiple -->
                    <div th:if="${pregunta instanceof T(com.github.Radu_A.evaluacion_final.entity.PreguntaSeleccionMultiple)}" class="quiz-options">
                        <label th:each="opcion : ${pregunta.opciones}" class="quiz-option quiz-option-check">
                            <input type="checkbox" th:name="'r_' + ${pregunta.id}" th:value="${opcion}">
                            <span class="quiz-option-marker quiz-option-marker-sm" th:text="${#strings.substring(opcion, 0, 1)}">A</span>
                            <span class="quiz-option-text" th:text="${opcion}">Opción</span>
                            <span class="quiz-option-checkbox"></span>
                        </label>
                    </div>
                </div>

                <div class="quiz-submit-wrap">
                    <button type="submit" class="btn-quiz-submit btn-quiz-submit-su">
                        Enviar respuestas
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>

</body>
</html>
