<section>
    <div class="container">
        <h1 th:text="${editMode} ? 'Editar Pregunta' : 'Crear Nueva Pregunta'">Formulario</h1>

        <form method="post" th:action="${editMode} ? @{/pregunta/editar/{id}(id=${preguntaId})} : @{/formulario-pregunta}">
            
            <div class="form-group">
                <label for="tematicaId">Temática:</label>
                <select name="tematicaId" id="tematicaId" class="form-control" required>
                    <option value="">-- Selecciona una temática --</option>
                    <option th:each="t : ${tematicas}" 
                            th:value="${t.id}" 
                            th:text="${t.nombre}"
                            th:selected="${editMode && t.id == tematicaId}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipoPregunta">Tipo de Pregunta:</label>
                <select name="tipoPregunta" id="tipoPregunta" class="form-control" required th:disabled="${editMode}">
                    <option value="VERDADERO_FALSO" th:selected="${tipoPregunta == 'VERDADERO_FALSO'}">Verdadero / Falso</option>
                    <option value="SELECCION_UNICA" th:selected="${tipoPregunta == 'SELECCION_UNICA'}">Selección Única</option>
                    <option value="SELECCION_MULTIPLE" th:selected="${tipoPregunta == 'SELECCION_MULTIPLE'}">Selección Múltiple</option>
                </select>
                <input type="hidden" name="tipoPregunta" th:if="${editMode}" th:value="${tipoPregunta}" />
            </div>

            <div class="form-group">
                <label for="enunciado">Enunciado:</label>
                <textarea name="enunciado" id="enunciado" class="form-control" rows="3" required th:text="${enunciado}"></textarea>
            </div>

            ---

            <div id="bloque-vf" th:if="${editMode ? tipoPregunta == 'VERDADERO_FALSO' : true}">
                <h3>Respuesta Correcta:</h3>
                <label>
                    <input type="radio" name="respuestaCorrecta" value="true" th:checked="${respuestaCorrecta == 'true'}"> Verdadero
                </label>
                <label>
                    <input type="radio" name="respuestaCorrecta" value="false" th:checked="${respuestaCorrecta == 'false'}"> Falso
                </label>
            </div>

            <div id="bloque-su" th:if="${editMode ? tipoPregunta == 'SELECCION_UNICA' : true}">
                <h3>Opciones (Selección Única)</h3>
                <div th:if="${editMode && opciones != null}">
                    <div th:each="opc, iter : ${opciones}" class="opcion-row">
                        <input type="text" th:name="'opcion_' + ${iter.index}" th:value="${opc}" class="form-control">
                        <input type="radio" name="opcionCorrecta" th:value="${iter.index}" th:checked="${opc == opcionCorrecta}"> Marcar correcta
                    </div>
                </div>
                <div th:if="${!editMode}">
                    </div>
            </div>

            <div id="bloque-sm" th:if="${editMode ? tipoPregunta == 'SELECCION_MULTIPLE' : true}">
                <h3>Opciones (Selección Múltiple)</h3>
                <div th:if="${editMode && opciones != null}">
                    <div th:each="opc, iter : ${opciones}" class="opcion-row">
                        <input type="text" th:name="'opcion_' + ${iter.index}" th:value="${opc}" class="form-control">
                        <input type="checkbox" name="opcionesCorrectas" th:value="${iter.index}" th:checked="${opcionesCorrectas != null && opcionesCorrectas.contains(opc)}"> Marcar correcta
                    </div>
                </div>
                <div th:if="${!editMode}">
                    </div>
            </div>

            ---

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Guardar Cambios' : 'Crear Pregunta'"></button>
                <a th:href="@{/pregunta/menu}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</section>
