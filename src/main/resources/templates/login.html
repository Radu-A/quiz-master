<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión</title>
</head>
<body>
    <h1>Iniciar sesión</h1>

    <!-- Spring Security pone el parámetro "error" en la URL cuando fallan las credenciales. -->
    <div th:if="${param.error}">
        <p style="color:red;">Usuario o contraseña incorrectos. Vuelve a intentarlo.</p>
    </div>

    <!-- El parámetro "logout" aparece tras cerrar sesión correctamente. -->
    <div th:if="${param.logout}">
        <p style="color:green;">Has cerrado sesión correctamente.</p>
    </div>

    <!--
      Spring Security intercepta el POST /login automáticamente.
      Los campos DEBEN llamarse "username" y "password".
      th:action="@{/login}" genera la URL con el context path correcto.
      El token CSRF lo inserta Thymeleaf automáticamente como campo oculto.
    -->
    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required autofocus />
        </div>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required />
        </div>
        <div>
            <button type="submit">Entrar</button>
        </div>
    </form>

    <hr/>
    <small>
        Usuarios de prueba:
        <strong>admin</strong> / admin123 (ROLE_ADMIN + ROLE_USER) |
        <strong>user</strong> / user123 (ROLE_USER)
    </small>
</body>
</html>
