services:
  mysql:
    image: mysql:8.0
    container_name: evaluacion-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-evaluaciondb}
      MYSQL_USER: ${MYSQL_USER:-evaluacion}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-evaluacion}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
